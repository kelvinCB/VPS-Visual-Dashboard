<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taigels VPS Dashboard - Forgot Password">
  <meta name="theme-color" content="#7c3aed">
  <title>Forgot Password - Taigels VPS Dashboard</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-submit.is-loading {
      position: relative;
      color: transparent !important;
    }

    .btn-submit.is-loading::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin: -10px 0 0 -10px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .feedback-msg {
      font-size: 0.875rem;
      margin-top: 8px;
      text-align: center;
      display: none;
      line-height: 1.4;
    }

    .feedback-msg.error {
      color: var(--error);
    }

    .feedback-msg.success {
      color: var(--success);
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <header class="login-header">
        <img class="login-logo" src="/icons/icon.svg" alt="Taigels VPS" />
        <h1 class="login-title">Forgot your password?</h1>
      </header>

      <noscript>
        <div class="feedback-msg error" style="display:block; margin-bottom:12px;">
          Password reset requires JavaScript in this demo. Please enable JavaScript and try again.
        </div>
      </noscript>

      <form class="login-form" id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="name@company.com" required autofocus
            autocomplete="email" autocapitalize="off" spellcheck="false" aria-describedby="feedback-msg">
        </div>

        <button class="btn-primary btn-submit" type="submit" id="submit-btn">Send reset link</button>
        <div id="feedback-msg" class="feedback-msg" aria-live="polite"></div>
      </form>

      <footer class="login-footer">
        <p>Remembered your password? <a href="/login" class="login-link">Back to sign in</a></p>
      </footer>
    </div>
  </div>

  <script>
    const getSystemTheme = () => {
      try {
        if (typeof window !== 'undefined' && window.matchMedia) {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
      } catch (e) {}
      return 'dark';
    };

    const savedTheme = localStorage.getItem('theme') || getSystemTheme();
    document.documentElement.dataset.theme = ({ dark: 'dark', light: 'light' }[savedTheme] || 'purple');

    const forgotForm = document.getElementById('forgot-form');
    const submitBtn = document.getElementById('submit-btn');
    const feedback = document.getElementById('feedback-msg');
    const emailInput = document.getElementById('email');

    function setFeedback(type, message) {
      feedback.classList.remove('error', 'success');
      feedback.classList.add(type);
      feedback.textContent = message;
      feedback.style.display = 'block';
      emailInput.setAttribute('aria-invalid', type === 'error' ? 'true' : 'false');
    }

    const status = new URLSearchParams(window.location.search).get('status');
    if (status === 'not-available') {
      setFeedback('error', 'Password reset is not available without JavaScript in this demo. Please enable JavaScript and try again.');
    }

    function simulateForgotPasswordRequest() {
      const minDelayMs = 650;
      const maxDelayMs = 1150;
      const delay = Math.floor(Math.random() * (maxDelayMs - minDelayMs + 1)) + minDelayMs;
      return new Promise((resolve) => setTimeout(resolve, delay));
    }

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (submitBtn.disabled) return;

      feedback.style.display = 'none';
      emailInput.setAttribute('aria-invalid', 'false');
      submitBtn.disabled = true;
      submitBtn.classList.add('is-loading');
      submitBtn.setAttribute('aria-busy', 'true');

      if (!emailInput.checkValidity()) {
        submitBtn.disabled = false;
        submitBtn.classList.remove('is-loading');
        submitBtn.removeAttribute('aria-busy');
        setFeedback('error', 'Please enter a valid email address.');
        return;
      }

      await simulateForgotPasswordRequest();

      submitBtn.classList.remove('is-loading');
      submitBtn.removeAttribute('aria-busy');
      submitBtn.textContent = 'Check your inbox';
      submitBtn.disabled = true;
      emailInput.value = '';

      setFeedback('success', 'If an account exists for this email, a reset link has been sent.');
    });
  </script>
</body>

</html>
